<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hub</title>
    <style>
        /* Обнуление отступов и базовые стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Анимированный фон (плавающий градиент) */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c20, #15072e, #05050a, #210936);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Дополнительный элемент: движущиеся неоновые круги на фоне */
        .bg-circles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .circle {
            position: absolute;
            background: rgba(168, 85, 247, 0.2);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 8s ease-in-out infinite;
        }

        .circle-1 { width: 300px; height: 300px; top: 10%; left: 15%; animation-delay: 0s; }
        .circle-2 { width: 250px; height: 250px; bottom: 15%; right: 15%; animation-delay: -3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }

        /* Центральная менюшка (эффект Glassmorphism) */
        .menu-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #a855f7;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        p {
            color: #b3b3b3;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Стили кнопок-переходников */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-link {
            display: block;
            padding: 14px;
            color: #fff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        /* Анимация при наведении на кнопку */
        .menu-link:hover {
            background: #a855f7;
            border-color: #c084fc;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
            transform: translateY(-3px);
        }

        .menu-link:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- Декоративные анимированные круги для фона -->
    <div class="bg-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <!-- Менюшка по центру -->
    <div class="menu-container">
        <!-- Вместо этой ссылки можно поставить свою аватарку -->
        <img class="profile-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=Lifenox" alt="Avatar">
        
        <h1>Добро пожаловать</h1>
        <p>Мои проекты и полезные ссылки</p>
        
        <!-- Кнопки-переходники -->
        <div class="links-group">
            <a href="https://github.com" target="_blank" class="menu-link">Мой GitHub</a>
            <a href="https://t.me" target="_blank" class="menu-link">Telegram Bot Project</a>
            <a href="#" class="menu-link">Игровой сервер</a>
            <a href="#" class="menu-link">YouTube Канал</a>
        </div>
    </div>

</body>
</html>
